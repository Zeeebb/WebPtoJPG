<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebP → JPG Converter</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --surface: #19191b;
    --surface2: #222224;
    --border: #2e2e32;
    --border2: #3e3e44;
    --text: #f0f0f0;
    --text2: #9a9aa8;
    --text3: #5a5a68;
    --accent: #5b8af0;
    --accent-dim: #1c2c52;
    --success: #3ecf8e;
    --success-dim: #0d3526;
    --danger: #f06060;
    --danger-dim: #3d1616;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 80px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .logo-icon {
    width: 40px; height: 40px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }

  .logo-icon svg { width: 22px; height: 22px; stroke: var(--accent); }

  h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--text2);
    margin-top: 6px;
  }

  .container {
    width: 100%;
    max-width: 700px;
  }

  /* Drop zone */
  #drop-zone {
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    padding: 44px 24px;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    background: var(--surface);
    margin-bottom: 24px;
    user-select: none;
  }

  #drop-zone:hover, #drop-zone.drag-over {
    background: var(--accent-dim);
    border-color: var(--accent);
  }

  #drop-zone svg { width: 40px; height: 40px; stroke: var(--text3); margin-bottom: 12px; transition: stroke 0.15s; }
  #drop-zone:hover svg, #drop-zone.drag-over svg { stroke: var(--accent); }

  #drop-zone .dz-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 5px; }
  #drop-zone .dz-sub { font-size: 13px; color: var(--text2); }

  #file-input { display: none; }

  /* Controls */
  .controls-bar {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }

  .ctrl-label {
    font-size: 12px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .ctrl-row { display: flex; align-items: center; gap: 10px; }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 140px;
    height: 4px;
    background: var(--border2);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid var(--bg);
  }

  input[type=range]::-moz-range-thumb {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid var(--bg);
  }

  .quality-badge {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    min-width: 36px;
  }

  .quality-hint {
    font-size: 12px;
    color: var(--text3);
    margin-left: auto;
  }

  /* File list */
  #file-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }

  .file-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.2s;
  }

  .file-item.done { border-color: #1e4033; }
  .file-item.error { border-color: #4a1e1e; }

  .thumb-wrap {
    width: 52px; height: 52px;
    flex-shrink: 0;
    border-radius: 6px;
    overflow: hidden;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
  }

  .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .file-info { flex: 1; min-width: 0; }

  .file-name {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
    margin-bottom: 3px;
  }

  .file-meta { font-size: 12px; color: var(--text3); margin-bottom: 4px; }

  .file-status {
    font-size: 12px;
    color: var(--text3);
  }

  .file-status.converting { color: var(--accent); }
  .file-status.done { color: var(--success); }
  .file-status.error { color: var(--danger); }

  .progress-track {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    margin-top: 6px;
    overflow: hidden;
    display: none;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 1px;
    width: 0%;
    transition: width 0.3s ease;
  }

  .file-actions { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }

  .btn-icon {
    width: 32px; height: 32px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: var(--surface2);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text2);
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }

  .btn-icon:hover { background: var(--border); color: var(--text); }
  .btn-icon:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
  .btn-icon svg { width: 16px; height: 16px; stroke: currentColor; }

  .btn-dl-single {
    height: 32px;
    padding: 0 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: var(--surface2);
    cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    color: var(--text2);
    font-size: 12px;
    font-weight: 500;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }

  .btn-dl-single:hover { background: var(--border); color: var(--text); }
  .btn-dl-single:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
  .btn-dl-single svg { width: 14px; height: 14px; stroke: currentColor; }

  /* Action bar */
  #actions-bar {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    flex-wrap: wrap;
  }

  .btn-primary {
    height: 36px;
    padding: 0 18px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--accent);
    background: var(--accent-dim);
    cursor: pointer;
    color: var(--accent);
    font-size: 13px;
    font-weight: 500;
    display: flex; align-items: center; gap: 7px;
    transition: background 0.15s;
  }

  .btn-primary:hover { background: #243d76; }
  .btn-primary:disabled { opacity: 0.35; cursor: default; pointer-events: none; }
  .btn-primary svg { width: 16px; height: 16px; stroke: currentColor; }

  .btn-secondary {
    height: 36px;
    padding: 0 18px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: transparent;
    cursor: pointer;
    color: var(--text2);
    font-size: 13px;
    font-weight: 500;
    display: flex; align-items: center; gap: 7px;
    transition: background 0.15s, color 0.15s;
  }

  .btn-secondary:hover { background: var(--surface2); color: var(--text); }
  .btn-secondary:disabled { opacity: 0.35; cursor: default; pointer-events: none; }
  .btn-secondary svg { width: 16px; height: 16px; stroke: currentColor; }

  #summary { font-size: 12px; color: var(--text3); margin-left: auto; }

  footer {
    margin-top: 48px;
    font-size: 12px;
    color: var(--text3);
    text-align: center;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
    </div>
    <h1>WebP → JPG</h1>
  </div>
  <p class="subtitle">Conversion locale · aucune donnée envoyée · zéro dépendance</p>
</header>

<div class="container">

  <div id="drop-zone" role="button" tabindex="0" aria-label="Zone de dépôt de fichiers WebP">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="16 16 12 12 8 16"/>
      <line x1="12" y1="12" x2="12" y2="21"/>
      <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
    </svg>
    <p class="dz-title">Glissez vos fichiers WebP ici</p>
    <p class="dz-sub">ou cliquez pour sélectionner · plusieurs fichiers acceptés</p>
  </div>
  <input type="file" id="file-input" accept="image/webp" multiple />

  <div class="controls-bar">
    <span class="ctrl-label">Qualité JPG</span>
    <div class="ctrl-row">
      <input type="range" id="quality-slider" min="50" max="100" value="92" step="1" />
      <span class="quality-badge" id="quality-val">92%</span>
    </div>
    <span class="quality-hint" id="quality-hint">Excellente</span>
  </div>

  <div id="file-list"></div>

  <div id="actions-bar">
    <button class="btn-primary" id="convert-all">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      Convertir tout
    </button>
    <button class="btn-secondary" id="dl-all" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Tout télécharger (.zip)
    </button>
    <button class="btn-secondary" id="clear-all">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6M14 11v6"/>
      </svg>
      Vider
    </button>
    <span id="summary"></span>
  </div>

</div>

<footer>Fonctionne hors-ligne · 100% navigateur · aucune donnée ne quitte votre machine</footer>

<script>
// Since JSZip is complex to embed fully, we use sequential downloads with proper delays
// and a clean implementation that works in any browser without external deps

const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const fileListEl = document.getElementById('file-list');
const actionsBar = document.getElementById('actions-bar');
const convertAllBtn = document.getElementById('convert-all');
const dlAllBtn = document.getElementById('dl-all');
const clearAllBtn = document.getElementById('clear-all');
const qualitySlider = document.getElementById('quality-slider');
const qualityValEl = document.getElementById('quality-val');
const qualityHintEl = document.getElementById('quality-hint');
const summaryEl = document.getElementById('summary');

let files = [];

const qualityHints = {
  range: [
    [90, 100, 'Maximale'],
    [80, 89, 'Excellente'],
    [70, 79, 'Très bonne'],
    [60, 69, 'Bonne'],
    [50, 59, 'Correcte'],
  ]
};

function getHint(q) {
  for (const [lo, hi, label] of qualityHints.range) {
    if (q >= lo && q <= hi) return label;
  }
  return '';
}

qualitySlider.addEventListener('input', () => {
  const q = parseInt(qualitySlider.value);
  qualityValEl.textContent = q + '%';
  qualityHintEl.textContent = getHint(q);
});

// Drag & drop
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', e => { if (!dropZone.contains(e.relatedTarget)) dropZone.classList.remove('drag-over'); });
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  addFiles(Array.from(e.dataTransfer.files).filter(f => f.type === 'image/webp' || f.name.toLowerCase().endsWith('.webp')));
});
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') fileInput.click(); });
fileInput.addEventListener('change', () => { addFiles(Array.from(fileInput.files)); fileInput.value = ''; });

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' o';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' Ko';
  return (bytes / 1048576).toFixed(2) + ' Mo';
}

function addFiles(newFiles) {
  let added = 0;
  newFiles.forEach(f => {
    if (files.find(x => x.file.name === f.name && x.file.size === f.size)) return;
    const id = Date.now().toString(36) + Math.random().toString(36).slice(2);
    const entry = { id, file: f, blob: null, status: 'pending' };
    files.push(entry);
    renderItem(entry);
    added++;
  });
  if (added) updateActionsBar();
}

function renderItem(entry) {
  const item = document.createElement('div');
  item.className = 'file-item';
  item.id = 'item-' + entry.id;

  // Thumb
  const thumbWrap = document.createElement('div');
  thumbWrap.className = 'thumb-wrap';
  const img = document.createElement('img');
  img.alt = '';
  const objUrl = URL.createObjectURL(entry.file);
  img.src = objUrl;
  img.onload = () => URL.revokeObjectURL(objUrl);
  thumbWrap.appendChild(img);

  // Info
  const info = document.createElement('div');
  info.className = 'file-info';

  const nameEl = document.createElement('div');
  nameEl.className = 'file-name';
  nameEl.textContent = entry.file.name;

  const metaEl = document.createElement('div');
  metaEl.className = 'file-meta';
  metaEl.textContent = formatSize(entry.file.size);

  const statusEl = document.createElement('div');
  statusEl.className = 'file-status';
  statusEl.id = 'status-' + entry.id;
  statusEl.textContent = 'En attente';

  const progressTrack = document.createElement('div');
  progressTrack.className = 'progress-track';
  progressTrack.id = 'progress-' + entry.id;
  const progressFill = document.createElement('div');
  progressFill.className = 'progress-fill';
  progressFill.id = 'bar-' + entry.id;
  progressTrack.appendChild(progressFill);

  info.appendChild(nameEl);
  info.appendChild(metaEl);
  info.appendChild(statusEl);
  info.appendChild(progressTrack);

  // Actions
  const actions = document.createElement('div');
  actions.className = 'file-actions';

  const dlBtn = document.createElement('button');
  dlBtn.className = 'btn-dl-single';
  dlBtn.id = 'dl-' + entry.id;
  dlBtn.disabled = true;
  dlBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> JPG`;
  dlBtn.addEventListener('click', () => downloadEntry(entry));

  const removeBtn = document.createElement('button');
  removeBtn.className = 'btn-icon';
  removeBtn.setAttribute('aria-label', 'Supprimer');
  removeBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
  removeBtn.addEventListener('click', () => {
    if (entry.blob) URL.revokeObjectURL(entry._blobUrl);
    files = files.filter(x => x.id !== entry.id);
    item.remove();
    updateActionsBar();
  });

  actions.appendChild(dlBtn);
  actions.appendChild(removeBtn);

  item.appendChild(thumbWrap);
  item.appendChild(info);
  item.appendChild(actions);
  fileListEl.appendChild(item);
}

function setStatus(entry, text, cls) {
  const el = document.getElementById('status-' + entry.id);
  if (!el) return;
  el.textContent = text;
  el.className = 'file-status ' + (cls || '');
}

function setProgress(entry, pct, visible) {
  const track = document.getElementById('progress-' + entry.id);
  const bar = document.getElementById('bar-' + entry.id);
  if (!track || !bar) return;
  track.style.display = visible ? 'block' : 'none';
  bar.style.width = pct + '%';
}

async function convertEntry(entry) {
  if (entry.status === 'done') return;
  const quality = parseInt(qualitySlider.value) / 100;
  entry.status = 'converting';
  setStatus(entry, 'Conversion en cours…', 'converting');
  setProgress(entry, 20, true);

  const item = document.getElementById('item-' + entry.id);

  return new Promise(resolve => {
    const img = new Image();
    const objUrl = URL.createObjectURL(entry.file);

    img.onload = () => {
      URL.revokeObjectURL(objUrl);
      setProgress(entry, 60, true);

      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d');
      // White background for transparent WebP
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0);

      setProgress(entry, 85, true);

      canvas.toBlob(blob => {
        if (!blob) {
          entry.status = 'error';
          setStatus(entry, '✕ Erreur de conversion', 'error');
          if (item) item.classList.add('error');
          setProgress(entry, 0, false);
          resolve();
          return;
        }

        entry.blob = blob;
        entry.status = 'done';
        entry.outName = entry.file.name.replace(/\.webp$/i, '') + '.jpg';

        setProgress(entry, 100, true);
        setTimeout(() => setProgress(entry, 100, false), 500);

        const ratio = ((1 - blob.size / entry.file.size) * 100).toFixed(0);
        const sign = blob.size < entry.file.size ? '↓' : '↑';
        setStatus(entry, `✓ ${formatSize(blob.size)} (${sign}${Math.abs(ratio)}%)`, 'done');

        if (item) item.classList.add('done');

        const dlBtn = document.getElementById('dl-' + entry.id);
        if (dlBtn) dlBtn.disabled = false;

        updateActionsBar();
        resolve();
      }, 'image/jpeg', quality);
    };

    img.onerror = () => {
      URL.revokeObjectURL(objUrl);
      entry.status = 'error';
      setStatus(entry, '✕ Fichier invalide', 'error');
      if (item) item.classList.add('error');
      setProgress(entry, 0, false);
      resolve();
    };

    img.src = objUrl;
  });
}

function downloadEntry(entry) {
  if (!entry.blob) return;
  const a = document.createElement('a');
  const url = URL.createObjectURL(entry.blob);
  a.href = url;
  a.download = entry.outName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

function updateActionsBar() {
  if (files.length === 0) { actionsBar.style.display = 'none'; return; }
  actionsBar.style.display = 'flex';
  const done = files.filter(x => x.status === 'done').length;
  const total = files.length;
  summaryEl.textContent = done > 0 ? `${done} / ${total} convertis` : `${total} fichier${total > 1 ? 's' : ''}`;
  dlAllBtn.disabled = done === 0;
}

convertAllBtn.addEventListener('click', async () => {
  convertAllBtn.disabled = true;
  const pending = files.filter(x => x.status !== 'done' && x.status !== 'converting');
  for (const entry of pending) {
    await convertEntry(entry);
  }
  convertAllBtn.disabled = false;
  updateActionsBar();
});

// "Tout télécharger" — sequential downloads with delay (reliable cross-browser approach)
dlAllBtn.addEventListener('click', async () => {
  const done = files.filter(x => x.status === 'done');
  if (done.length === 0) return;

  dlAllBtn.disabled = true;
  dlAllBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Téléchargement…`;

  for (let i = 0; i < done.length; i++) {
    downloadEntry(done[i]);
    if (i < done.length - 1) {
      await new Promise(r => setTimeout(r, 300));
    }
  }

  setTimeout(() => {
    dlAllBtn.disabled = false;
    dlAllBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Tout télécharger`;
  }, 1000);
});

clearAllBtn.addEventListener('click', () => {
  files = [];
  fileListEl.innerHTML = '';
  updateActionsBar();
});
</script>
</body>
